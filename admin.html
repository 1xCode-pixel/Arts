<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель</title>
    <style>
        :root {
            --primary: #ff4757; --primary-hover: #ff6b81;
            --bg: #0f0f13; --card-bg: #1e1e24; --text: #f1f2f6;
            --text-muted: #a4b0be; --input-bg: #2a2a32;
            --accent: #f39c12;
        }
        * { box-sizing: border-box; }
        body { font-family: 'Inter', 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; min-height: 100vh; }

        @keyframes fadeIn { from { opacity:0; transform:translateY(15px); } to { opacity:1; transform:translateY(0); } }
        @keyframes spin { to { transform: rotate(360deg); } }

        .admin-header {
            padding: 24px 40px; background: rgba(30,30,36,0.9);
            backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 50;
        }
        .admin-header h1 { margin: 0; font-size: 24px; color: var(--accent); }
        .admin-header a { color: var(--text-muted); text-decoration: none; font-size: 14px; }
        .admin-header a:hover { color: var(--primary); }

        .admin-body { padding: 40px; max-width: 1200px; margin: 0 auto; }

        /* Секции */
        .admin-section {
            background: var(--card-bg); border-radius: 16px; padding: 32px;
            margin-bottom: 32px; border: 1px solid rgba(255,255,255,0.05);
            animation: fadeIn 0.5s ease-out;
        }
        .section-title {
            font-size: 20px; font-weight: 700; margin: 0 0 24px;
            color: var(--accent); display: flex; align-items: center; gap: 10px;
        }

        /* Форма */
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 13px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 13px 16px;
            background: var(--input-bg); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px; color: var(--text); font-size: 15px; font-family: inherit;
            transition: border-color 0.3s;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none; border-color: var(--primary);
        }
        .form-group select option { background: var(--card-bg); }

        /* Превью изображения */
        .img-preview {
            width: 100%; max-height: 250px; object-fit: cover; border-radius: 8px;
            margin-top: 10px; display: none; border: 2px solid var(--primary);
        }

        /* Кнопки */
        .btn {
            padding: 13px 28px; border: none; border-radius: 8px;
            cursor: pointer; font-weight: 700; font-size: 15px;
            transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-primary { background: var(--primary); color: white; box-shadow: 0 5px 15px rgba(255,71,87,0.3); }
        .btn-primary:hover { background: var(--primary-hover); transform: translateY(-2px); }
        .btn-secondary { background: transparent; border: 2px solid var(--text-muted); color: var(--text); }
        .btn-secondary:hover { border-color: white; }
        .btn-accent { background: linear-gradient(135deg, var(--accent), #e67e22); color: white; }
        .btn-accent:hover { opacity: 0.9; transform: translateY(-2px); }
        .btn-danger { background: transparent; border: 2px solid #e74c3c; color: #e74c3c; }
        .btn-danger:hover { background: #e74c3c; color: white; }
        .btn-sm { padding: 8px 16px; font-size: 12px; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

        /* Список табов */
        .tabs-list { margin-bottom: 20px; }
        .tab-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 14px 18px; background: var(--input-bg); border-radius: 8px;
            margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.05);
        }
        .tab-item-info { display: flex; align-items: center; gap: 12px; }
        .tab-item-label { font-weight: 600; }
        .tab-item-id { font-size: 12px; color: var(--text-muted); font-family: monospace; }
        .nsfw-badge { background: var(--primary); color: white; font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 700; }

        /* Таблица артов */
        .arts-table { width: 100%; border-collapse: collapse; }
        .arts-table th, .arts-table td {
            padding: 14px 16px; text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 14px;
        }
        .arts-table th { color: var(--text-muted); font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .arts-table tr:hover td { background: rgba(255,255,255,0.02); }
        .arts-table img { width: 60px; height: 60px; object-fit: cover; border-radius: 6px; }

        .status-badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 700; }
        .status-safe { background: rgba(46, 204, 113, 0.2); color: #2ecc71; }
        .status-nsfw { background: rgba(255, 71, 87, 0.2); color: var(--primary); }

        /* Загрузчик */
        .loader { text-align: center; padding: 40px; color: var(--text-muted); }
        .spinner { width: 36px; height: 36px; border: 3px solid rgba(255,71,87,0.3); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }

        /* Тосты */
        .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 999; display: flex; flex-direction: column; gap: 10px; }
        .toast { background: var(--card-bg); color: var(--text); padding: 14px 20px; border-radius: 10px; font-size: 14px; border-left: 4px solid var(--primary); box-shadow: 0 8px 24px rgba(0,0,0,0.4); animation: fadeIn 0.3s ease-out; max-width: 320px; }
        .toast.success { border-color: #2ecc71; }
        .toast.error { border-color: #e74c3c; }

        /* Сетка статистики */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; }
        .stat-card { background: var(--input-bg); border-radius: 12px; padding: 20px; text-align: center; }
        .stat-value { font-size: 36px; font-weight: 800; color: var(--primary); }
        .stat-label { font-size: 13px; color: var(--text-muted); margin-top: 4px; }

        /* Доступ запрещён */
        .access-denied { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; text-align: center; }
        .access-denied .icon { font-size: 80px; margin-bottom: 20px; }

        @media (max-width: 768px) {
            .admin-header { padding: 16px 20px; }
            .admin-body { padding: 20px; }
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>

            renderAdminPanel(user);
        });
