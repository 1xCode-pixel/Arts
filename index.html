<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Габриэль | lilyshelte</title>
    <style>
        :root {
            --primary: #ff4757;
            --primary-hover: #ff6b81;
            --bg: #0f0f13;
            --card-bg: #1e1e24;
            --text: #f1f2f6;
            --text-muted: #a4b0be;
            --input-bg: #2a2a32;
            --comment-bg: #25252d;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, var(--bg) 0%, #15151a 100%);
            color: var(--text);
            margin: 0; padding: 0; min-height: 100vh;
        }

        /* ===== АНИМАЦИИ ===== */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes popIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ===== ШАПКА ===== */
        header {
            padding: 40px 50px;
            background: rgba(30, 30, 36, 0.7);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex; flex-direction: column; align-items: flex-start;
            animation: fadeIn 0.8s ease-out;
            position: sticky; top: 0; z-index: 50;
        }

        .header-top { display: flex; justify-content: space-between; align-items: flex-start; width: 100%; margin-bottom: 30px; }
        .branding-row { display: flex; align-items: center; gap: 20px; }
        .site-avatar {
            width: 100px; height: 100px; border-radius: 50%; object-fit: cover;
            border: 3px solid var(--primary);
            box-shadow: 0 0 20px rgba(255, 71, 87, 0.3);
            transition: transform 0.3s ease;
        }
        .site-avatar:hover { transform: rotate(5deg) scale(1.05); }
        .site-info h1 { margin: 0; font-size: 32px; font-weight: 800; letter-spacing: 1px; }
        .site-info p { margin: 5px 0 0; color: var(--text-muted); font-size: 16px; }

        /* ===== AUTH ЗОНА ===== */
        .auth-zone { display: flex; align-items: center; gap: 12px; }
        .user-badge {
            display: flex; align-items: center; gap: 10px;
            background: var(--card-bg); padding: 8px 16px; border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .user-badge img { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }
        .user-badge .username { font-size: 14px; font-weight: 600; }
        .admin-badge {
            background: linear-gradient(135deg, var(--primary), #ff6b35);
            color: white; font-size: 10px; font-weight: 700;
            padding: 2px 8px; border-radius: 10px; text-transform: uppercase; letter-spacing: 1px;
        }

        /* ===== КНОПКИ ===== */
        .btn {
            padding: 12px 24px; border: none; border-radius: 8px;
            cursor: pointer; font-weight: 700; font-size: 14px;
            transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-primary { background: var(--primary); color: white; box-shadow: 0 5px 15px rgba(255, 71, 87, 0.3); }
        .btn-primary:hover { background: var(--primary-hover); transform: translateY(-2px); }
        .btn-secondary { background: transparent; border: 2px solid var(--text-muted); color: var(--text); }
        .btn-secondary:hover { border-color: white; color: white; }
        .btn-ghost { background: rgba(255,255,255,0.05); color: var(--text-muted); border: 1px solid rgba(255,255,255,0.1); }
        .btn-ghost:hover { background: rgba(255,255,255,0.1); color: var(--text); }
        .btn-sm { padding: 8px 16px; font-size: 12px; }

        /* ===== ПАНЕЛЬ АДМИНА ===== */
        #admin-panel {
            display: none; margin: 30px auto 0; max-width: 800px; width: 90%;
            padding: 20px; background: var(--card-bg); border: 1px dashed var(--primary);
            border-radius: 12px; text-align: center; animation: fadeIn 0.5s;
        }
        .admin-controls { display: flex; gap: 10px; justify-content: center; margin-top: 15px; flex-wrap: wrap;}
        .admin-controls input, .admin-controls select {
            padding: 10px; background: var(--input-bg); color: white; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
        }

        /* ===== ТАБЫ ===== */
        .tabs { display: flex; gap: 20px; flex-wrap: wrap; margin-top: 20px;}
        .tab-btn {
            background: transparent; color: var(--text-muted);
            border: none; font-size: 20px; font-weight: 600;
            cursor: pointer; padding: 10px 0;
            position: relative; transition: color 0.3s ease;
        }
        .tab-btn::after {
            content: ''; position: absolute; bottom: 0; left: 0;
            width: 0; height: 3px; background: var(--primary);
            transition: width 0.3s ease; border-radius: 3px;
        }
        .tab-btn:hover { color: var(--text); }
        .tab-btn.active { color: var(--primary); }
        .tab-btn.active::after { width: 100%; }

        /* ===== ГАЛЕРЕЯ ===== */
        .gallery-wrapper { padding: 40px 50px; transition: filter 0.5s ease; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }

        .art-card {
            background: var(--card-bg); border-radius: 12px; overflow: hidden;
            position: relative; box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            transition: transform 0.4s ease, box-shadow 0.4s ease;
            animation: fadeIn 0.5s ease-out backwards; cursor: pointer;
        }
        .art-card:hover { transform: translateY(-10px); box-shadow: 0 15px 30px rgba(255, 71, 87, 0.2); }
        .art-card-img { width: 100%; height: 320px; object-fit: cover; transition: transform 0.5s ease; display: block; }
        .art-card:hover .art-card-img { transform: scale(1.05); }

        .art-card-info { padding: 15px 18px; background: rgba(0,0,0,0.5); position: absolute; bottom: 0; width: 100%; opacity: 0; transition: 0.3s;}
        .art-card:hover .art-card-info { opacity: 1; }
        .art-card-meta { font-size: 14px; color: #fff; display: flex; gap: 15px; align-items: center; justify-content: center; font-weight: bold;}

        .blurred-gallery { filter: blur(35px) grayscale(50%); pointer-events: none; user-select: none; }

        /* ===== СОСТОЯНИЕ ЗАГРУЗКИ / ПУСТО ===== */
        .loader { text-align: center; padding: 60px; color: var(--text-muted); font-size: 16px; grid-column: 1/-1;}
        .loader .spinner {
            width: 40px; height: 40px; border: 3px solid rgba(255,71,87,0.3);
            border-top-color: var(--primary); border-radius: 50%;
            animation: spin 0.8s linear infinite; margin: 0 auto 16px;
        }
        .empty-state { text-align: center; padding: 80px 20px; color: var(--text-muted); grid-column: 1/-1;}

        /* ===== МОДАЛЬНЫЕ ОКНА ===== */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
            z-index: 1000; justify-content: center; align-items: center; padding: 20px;
            overflow-y: auto;
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            background: var(--card-bg); padding: 50px;
            border-radius: 16px; max-width: 650px; width: 100%;
            text-align: center; border: 1px solid rgba(255, 71, 87, 0.3);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative; margin: auto;
        }
        .modal-content h2 { font-size: 28px; margin-top: 0; color: var(--primary); }
        .modal-content p { font-size: 16px; color: #ccc; line-height: 1.6; }

        .modal-close {
            position: absolute; top: 16px; right: 20px;
            background: none; border: none; color: var(--text-muted);
            font-size: 24px; cursor: pointer; line-height: 1; transition: color 0.2s;
        }
        .modal-close:hover { color: var(--primary); }
        .btn-group { display: flex; justify-content: center; gap: 15px; margin-top: 30px; flex-wrap: wrap; }

        /* ===== AUTH МОДАЛКА ===== */
        .auth-form { text-align: left; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 14px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .form-group input {
            width: 100%; padding: 14px 16px;
            background: var(--input-bg); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px; color: var(--text); font-size: 16px; transition: border-color 0.3s;
        }
        .form-group input:focus { outline: none; border-color: var(--primary); }
        .form-error { color: #e74c3c; font-size: 13px; margin-top: 8px; display: none; }
        .auth-switch { text-align: center; margin-top: 20px; color: var(--text-muted); font-size: 14px; }
        .auth-switch a { color: var(--primary); cursor: pointer; text-decoration: none; font-weight: 600; }

        /* ===== МОДАЛКА ПРОСМОТРА АРТА ===== */
        .art-view-modal { max-width: 900px; text-align: left; padding: 0; overflow: hidden; }
        .art-view-modal .art-image { width: 100%; max-height: 65vh; object-fit: contain; background: #000; display: block; }
        .art-view-body { padding: 30px; }

        /* ===== КОММЕНТАРИИ ===== */
        .comments-section { margin-top: 0; }
        .comments-list { max-height: 220px; overflow-y: auto; margin-bottom: 16px; margin-top: 20px;}
        .comments-list::-webkit-scrollbar { width: 5px; }
        .comments-list::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 3px; }
        .comment-item {
            display: flex; gap: 12px; padding: 12px;
            background: var(--comment-bg); border-radius: 8px; margin-bottom: 10px;
        }
        .comment-body { flex: 1; }
        .comment-author { font-weight: 700; font-size: 13px; color: var(--primary); margin-bottom: 5px; display:block;}
        .comment-text { font-size: 14px; line-height: 1.5; color: var(--text); }
        .comment-form { display: flex; gap: 10px; }
        .comment-input {
            flex: 1; padding: 12px 16px; background: var(--input-bg); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px; color: var(--text); font-size: 14px; resize: none; font-family: inherit;
        }

        /* ===== УВЕДОМЛЕНИЯ ===== */
        .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
        .toast { background: var(--card-bg); color: var(--text); padding: 14px 20px; border-radius: 10px; border-left: 4px solid var(--primary); box-shadow: 0 8px 24px rgba(0,0,0,0.4); animation: fadeIn 0.3s ease-out;}

        @media (max-width: 768px) {
            header { padding: 24px 20px; }
            .gallery-wrapper { padding: 24px 20px; }
            .site-info h1 { font-size: 22px; }
            .site-avatar { width: 70px; height: 70px; }
            .header-top { flex-direction: column; gap: 16px; }
            .modal-content { padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-top">
            <div class="branding-row">
                <img src="avatar.jpg" alt="Габриэль" class="site-avatar" onerror="this.src='https://placehold.co/100x100/ff4757/white?text=G'">
                <div class="site-info">
                    <h1>Габриэль</h1>
                    <p>Digital Artist / Illustrator</p>
                </div>
            </div>
            <div class="auth-zone" id="authZone">
                <button class="btn btn-primary btn-sm" id="btnOpenAuth">Войти / Регистрация</button>
            </div>
        </div>
        
        <div class="tabs" id="tabsContainer">
            <button class="tab-btn active" id="tab-safe">Простые арты</button>
            <button class="tab-btn" id="tab-18plus">Арты 18+ 🔒</button>
        </div>
    </header>

    <div id="admin-panel">
        <h3 style="margin-top:0; color: var(--primary);">Студия: Добавить арт по ссылке</h3>
        <div class="admin-controls">
            <input type="text" id="upload-url" placeholder="Прямая ссылка на изображение (URL)..." style="flex: 2;">
            <select id="upload-category" style="flex: 1;">
                <option value="safe">Обычный арт (Safe)</option>
                <option value="18plus">Арт 18+ (NSFW)</option>
            </select>
            <button class="btn btn-primary" id="btn-upload">Опубликовать</button>
        </div>
    </div>

    <div class="gallery-wrapper" id="galleryWrapper">
        <div class="gallery" id="gallery">
            <div class="loader"><div class="spinner"></div>Подключение к базе...</div>
        </div>
    </div>

    <div class="modal-overlay" id="modalAgreement">
        <div class="modal-content">
            <h2>🔞 Внимание: Контент 18+</h2>
            <p>Вы переходите в закрытый раздел. Нажимая кнопку согласия, вы подтверждаете, что вам есть 18 лет.</p>
            <div class="btn-group">
                <button class="btn btn-primary" id="btnAgree">Мне есть 18 лет</button>
                <button class="btn btn-secondary" id="btnCancel">Отмена</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modalAuth">
        <div class="modal-content" style="max-width: 480px; text-align: left;">
            <button class="modal-close" id="btnCloseAuth">✕</button>
            <h2 style="text-align:center;" id="authTitle">Вход в аккаунт</h2>
            <div class="auth-form" id="authForm">
                <div class="form-group" id="nicknameGroup" style="display:none;">
                    <label>Никнейм</label>
                    <input type="text" id="inputNickname" placeholder="Ваш никнейм" maxlength="32">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="inputEmail" placeholder="example@mail.com">
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="inputPassword" placeholder="Минимум 6 символов">
                    <div class="form-error" id="authError">Ошибка авторизации</div>
                </div>
                <button class="btn btn-primary" style="width:100%;" id="btnAuthSubmit">Войти</button>
                <button class="btn btn-ghost" style="width:100%; margin-top:10px;" id="btnAnonLogin">Войти анонимно (Гость)</button>
                <div class="auth-switch">
                    Нет аккаунта? <a id="authSwitchLink">Зарегистрироваться</a>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modalArt">
        <div class="modal-content art-view-modal">
            <button class="modal-close" style="top:12px;right:12px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 50%; color: white;" id="btnCloseArt">✕</button>
            <img class="art-image" id="artViewImg" src="">
            <div class="art-view-body">
                
                <div style="display:flex; justify-content:center; gap:20px; padding-bottom:15px; border-bottom:1px solid rgba(255,255,255,0.1);">
                    <button class="btn btn-secondary" id="btn-like">❤️ <span id="lb-hearts">0</span></button>
                    <button class="btn btn-secondary" id="btn-fire">🔥 <span id="lb-fires">0</span></button>
                </div>

                <div class="comments-section">
                    <div class="comments-list" id="commentsList"></div>
                    <div id="commentFormWrap"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signInAnonymously, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, collection, doc, getDoc, getDocs, addDoc, query, where, orderBy, serverTimestamp, setDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        // === ИСПРАВЛЕННЫЕ КЛЮЧИ ===
        const firebaseConfig = {
            apiKey: "AIzaSyC_ztsyKmGRriSJ_iJlgTJCUq_AvxOqHOM",
            authDomain: "lilyshelte.firebaseapp.com",
            projectId: "lilyshelte",
            storageBucket: "lilyshelte.firebasestorage.app",
            messagingSenderId: "778800933672",
            appId: "1:778800933672:web:c8be45ac174157254bfe1d"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // === СОСТОЯНИЕ ===
        let currentUser = null;
        let isAdmin = false;
        let isAdultUser = localStorage.getItem('isAdultUser') === 'true';
        let currentTab = 'safe';
        let isLoginMode = true;
        let artsArray = [];
        let currentArt = null;

        // === ЭЛЕМЕНТЫ ===
        const modalAuth = document.getElementById('modalAuth');
        const modalArt = document.getElementById('modalArt');
        const gallery = document.getElementById('gallery');
        const galleryWrapper = document.getElementById('galleryWrapper');
        const adminPanel = document.getElementById('admin-panel');

        function showToast(msg, type = 'info') {
            const t = document.createElement('div');
            t.className = `toast ${type}`;
            t.textContent = msg;
            document.getElementById('toastContainer').appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        // === АВТОРИЗАЦИЯ ===
        document.getElementById('btnOpenAuth').onclick = () => { isLoginMode = true; updateAuthForm(); modalAuth.classList.add('active'); };
        document.getElementById('btnCloseAuth').onclick = () => modalAuth.classList.remove('active');
        document.getElementById('authSwitchLink').onclick = () => { isLoginMode = !isLoginMode; updateAuthForm(); };

        function updateAuthForm() {
            document.getElementById('authTitle').textContent = isLoginMode ? 'Вход в аккаунт' : 'Регистрация';
            document.getElementById('btnAuthSubmit').textContent = isLoginMode ? 'Войти' : 'Создать аккаунт';
            document.getElementById('authSwitchLink').textContent = isLoginMode ? 'Зарегистрироваться' : 'Уже есть аккаунт';
            document.getElementById('nicknameGroup').style.display = isLoginMode ? 'none' : 'block';
            document.getElementById('authError').style.display = 'none';
        }

        document.getElementById('btnAnonLogin').onclick = async () => {
            try { await signInAnonymously(auth); modalAuth.classList.remove('active'); showToast('Вход выполнен анонимно', 'success'); } 
            catch (e) { showToast('Ошибка анонимного входа', 'error'); }
        };

        document.getElementById('btnAuthSubmit').onclick = async () => {
            const email = document.getElementById('inputEmail').value.trim();
            const password = document.getElementById('inputPassword').value;
            const nickname = document.getElementById('inputNickname').value.trim();
            const err = document.getElementById('authError'); err.style.display = 'none';

            try {
                if (isLoginMode) {
                    await signInWithEmailAndPassword(auth, email, password);
                } else {
                    if (!nickname) { err.textContent = 'Введите никнейм'; err.style.display = 'block'; return; }
                    const cred = await createUserWithEmailAndPassword(auth, email, password);
                    await updateProfile(cred.user, { displayName: nickname });
                    await setDoc(doc(db, 'users', cred.user.uid), { admin: false });
                }
                modalAuth.classList.remove('active');
                showToast(isLoginMode ? 'С возвращением!' : 'Аккаунт создан!', 'success');
            } catch (e) { err.textContent = 'Ошибка ввода данных'; err.style.display = 'block'; }
        };

        onAuthStateChanged(auth, async (user) => {
            currentUser = user;
            isAdmin = false;
            const zone = document.getElementById('authZone');
            
            if (user) {
                try {
                    const uDoc = await getDoc(doc(db, 'users', user.uid));
                    if (uDoc.exists()) isAdmin = uDoc.data().admin === true;
                } catch(e) {}

                const name = user.isAnonymous ? "Аноним" : (user.displayName || "Юзер");
                zone.innerHTML = `
                    <div class="user-badge">
                        <span class="username">${name}</span>
                        ${isAdmin ? '<span class="admin-badge">Admin</span>' : ''}
                    </div>
                    <button class="btn btn-ghost btn-sm" id="btnLogout">Выйти</button>
                `;
                document.getElementById('btnLogout').onclick = () => signOut(auth);
                adminPanel.style.display = isAdmin ? 'block' : 'none';
            } else {
                zone.innerHTML = `<button class="btn btn-primary btn-sm" id="btnOpenAuth">Войти / Регистрация</button>`;
                document.getElementById('btnOpenAuth').onclick = () => { isLoginMode = true; updateAuthForm(); modalAuth.classList.add('active'); };
                adminPanel.style.display = 'none';
            }
        });

        // === АДМИНКА (Загрузка ссылки) ===
        document.getElementById('btn-upload').onclick = async () => {
            const url = document.getElementById('upload-url').value.trim();
            const type = document.getElementById('upload-category').value;
            if(!url) return showToast('Вставьте ссылку!', 'error');

            try {
                await addDoc(collection(db, "artworks"), { url, type, hearts: 0, fires: 0, commentsCount: 0, createdAt: Date.now() });
                document.getElementById('upload-url').value = '';
                showToast('Арт опубликован!', 'success');
                loadGallery();
            } catch (e) { showToast('Ошибка публикации', 'error'); }
        };

        // === ГАЛЕРЕЯ И СОРТИРОВКА ПО БАЛЛАМ ===
        async function loadGallery() {
            gallery.innerHTML = '<div class="loader"><div class="spinner"></div></div>';
            artsArray = [];
            try {
                const q = query(collection(db, "artworks"), where("type", "==", currentTab));
                const snap = await getDocs(q);
                gallery.innerHTML = '';

                if (snap.empty) { gallery.innerHTML = '<div class="empty-state"><p>Тут пока пусто.</p></div>'; return; }

                snap.forEach(d => {
                    let art = d.data(); art.id = d.id;
                    art.hearts = art.hearts || 0; art.fires = art.fires || 0;
                    // ФОРМУЛА СОРТИРОВКИ (1 лайк = 1, 1 огонь = 0.5)
                    art.score = art.hearts + (art.fires * 0.5); 
                    artsArray.push(art);
                });

                artsArray.sort((a,b) => b.score - a.score);

                artsArray.forEach((art, index) => {
                    const card = document.createElement('div');
                    card.className = 'art-card';
                    card.style.animationDelay = `${index * 0.05}s`;
                    card.innerHTML = `
                        <img class="art-card-img" src="${art.url}" loading="lazy">
                        <div class="art-card-info">
                            <div class="art-card-meta">
                                <span>❤️ ${art.hearts}</span> <span>🔥 ${art.fires}</span> <span>💬 ${art.commentsCount || 0}</span>
                            </div>
                        </div>
                    `;
                    card.onclick = () => openArt(index);
                    gallery.appendChild(card);
                });
            } catch (e) { gallery.innerHTML = '<div class="empty-state">Ошибка загрузки базы.</div>'; }
        }

        // === ВКЛАДКИ ===
        document.getElementById('tab-safe').onclick = () => { currentTab = 'safe'; document.getElementById('tab-safe').classList.add('active'); document.getElementById('tab-18plus').classList.remove('active'); galleryWrapper.classList.remove('blurred-gallery'); loadGallery(); };
        document.getElementById('tab-18plus').onclick = () => { 
            if(!currentUser) { isLoginMode = true; updateAuthForm(); modalAuth.classList.add('active'); return; }
            currentTab = '18plus'; document.getElementById('tab-18plus').classList.add('active'); document.getElementById('tab-safe').classList.remove('active'); loadGallery();
            if(!isAdultUser) { galleryWrapper.classList.add('blurred-gallery'); document.getElementById('modalAgreement').classList.add('active'); }
        };
        document.getElementById('btnAgree').onclick = () => { localStorage.setItem('isAdultUser', 'true'); isAdultUser = true; document.getElementById('modalAgreement').classList.remove('active'); galleryWrapper.classList.remove('blurred-gallery'); };
        document.getElementById('btnCancel').onclick = () => { document.getElementById('modalAgreement').classList.remove('active'); document.getElementById('tab-safe').click(); };

        // === ПРОСМОТР АРТА ===
        function openArt(index) {
            currentArt = artsArray[index];
            document.getElementById('artViewImg').src = currentArt.url;
            document.getElementById('lb-hearts').innerText = currentArt.hearts;
            document.getElementById('lb-fires').innerText = currentArt.fires;
            modalArt.classList.add('active');
            
            const wrap = document.getElementById('commentFormWrap');
            if(currentUser) {
                wrap.innerHTML = `
                    <div class="comment-form">
                        <input type="text" class="comment-input" id="c-input" placeholder="Написать комментарий...">
                        <button class="btn btn-primary" id="btn-send-c">➤</button>
                    </div>`;
                document.getElementById('btn-send-c').onclick = sendComment;
            } else {
                wrap.innerHTML = `<div style="text-align:center; color:#888;">Войдите, чтобы писать комментарии</div>`;
            }
            loadComments(currentArt.id);
        }
        document.getElementById('btnCloseArt').onclick = () => modalArt.classList.remove('active');

        // === РЕАКЦИИ И КОММЕНТЫ ===
        document.getElementById('btn-like').onclick = async () => {
            if(!currentUser) return showToast('Войдите для реакций!', 'error');
            currentArt.hearts++; document.getElementById('lb-hearts').innerText = currentArt.hearts;
            await updateDoc(doc(db, "artworks", currentArt.id), { hearts: increment(1) });
        };
        document.getElementById('btn-fire').onclick = async () => {
            if(!currentUser) return showToast('Войдите для реакций!', 'error');
            currentArt.fires++; document.getElementById('lb-fires').innerText = currentArt.fires;
            await updateDoc(doc(db, "artworks", currentArt.id), { fires: increment(1) });
        };

        async function sendComment() {
            const input = document.getElementById('c-input');
            const text = input.value.trim();
            if(!text) return;
            input.value = '';
            const name = currentUser.isAnonymous ? "Аноним" : (currentUser.displayName || "Юзер");
            await addDoc(collection(db, "artworks", currentArt.id, "comments"), { user: name, text, at: Date.now() });
            await updateDoc(doc(db, "artworks", currentArt.id), { commentsCount: increment(1) });
            loadComments(currentArt.id);
        }

        async function loadComments(id) {
            const list = document.getElementById('commentsList'); list.innerHTML = '';
            const q = query(collection(db, "artworks", id, "comments"), orderBy("at", "asc"));
            const snap = await getDocs(q);
            if(snap.empty) { list.innerHTML = '<div style="color:#888; text-align:center;">Будьте первым!</div>'; return; }
            snap.forEach(d => {
                const c = d.data();
                list.innerHTML += `<div class="comment-item">
                    <div class="comment-author">${c.user}</div>
                    <div class="comment-text">${c.text}</div>
                </div>`;
            });
            list.scrollTop = list.scrollHeight;
        }

        // Закрытие по клику вне модалки
        window.onclick = (e) => {
            if (e.target == modalAuth) modalAuth.classList.remove('active');
            if (e.target == modalArt) modalArt.classList.remove('active');
        }

        loadGallery();
    </script>
</body>
</html>
