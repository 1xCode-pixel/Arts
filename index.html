<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Габриэль | lilyshelte</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #ff007f;
            --primary-hover: #ff3399;
            --bg: #050505;
            --card-bg: #111111;
            --text: #f1f2f6;
            --text-muted: #6a6a78;
            --input-bg: #1a1a1a;
            --comment-bg: #181818;
            --glow: 0 0 15px rgba(255, 0, 127, 0.4), 0 0 30px rgba(255, 0, 127, 0.2);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; min-height: 100vh; overflow-x: hidden; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes popIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        /* --- ШАПКА --- */
        header {
            padding: 25px 50px; background: rgba(5, 5, 5, 0.85); backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 0, 127, 0.1);
            position: sticky; top: 0; z-index: 50; animation: fadeIn 0.8s ease-out;
        }

        .header-top { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 25px; }
        .branding-row { display: flex; align-items: center; gap: 20px; }
        .site-avatar { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary); box-shadow: var(--glow); transition: 0.3s ease; }
        .site-avatar:hover { transform: scale(1.05) rotate(5deg); }
        .site-info h1 { margin: 0; font-family: 'Caveat', cursive; font-size: 38px; color: #fff; text-shadow: 0 0 10px rgba(255,0,127,0.5); }

        /* --- AUTH ЗОНА --- */
        .auth-zone { display: flex; align-items: center; gap: 12px; }
        .user-badge { display: flex; align-items: center; gap: 10px; background: var(--card-bg); padding: 6px 14px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.05); }
        .user-badge .username { font-size: 14px; font-weight: 600; }
        .admin-badge { background: var(--primary); color: white; font-size: 10px; font-weight: 800; padding: 2px 8px; border-radius: 10px; text-transform: uppercase; box-shadow: var(--glow); cursor: pointer; transition: 0.3s;}
        .admin-badge:hover { transform: scale(1.1); }

        /* --- КНОПКИ --- */
        .btn { padding: 12px 24px; border: none; border-radius: 12px; cursor: pointer; font-weight: 700; font-size: 14px; font-family: 'Outfit'; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .btn-primary { background: var(--primary); color: white; box-shadow: 0 4px 15px rgba(255, 0, 127, 0.4); }
        .btn-primary:hover { background: var(--primary-hover); transform: translateY(-3px); box-shadow: var(--glow); }
        .btn-outline { background: transparent; border: 2px solid rgba(255,255,255,0.1); color: var(--text); }
        .btn-outline:hover { border-color: var(--primary); color: var(--primary); box-shadow: inset 0 0 10px rgba(255,0,127,0.2); }
        .btn-sm { padding: 8px 16px; font-size: 12px; border-radius: 8px; }

        /* --- ТАБЫ --- */
        .tabs { display: flex; justify-content: center; gap: 30px; margin-top: 10px; flex-wrap: wrap;}
        .tab-btn { background: transparent; color: var(--text-muted); border: none; font-size: 16px; font-weight: 600; cursor: pointer; padding: 10px 0; position: relative; transition: 0.3s ease; text-transform: uppercase; letter-spacing: 1px; }
        .tab-btn::after { content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 0; height: 2px; background: var(--primary); transition: width 0.3s ease; box-shadow: var(--glow); }
        .tab-btn:hover { color: var(--text); }
        .tab-btn.active { color: #fff; }
        .tab-btn.active::after { width: 100%; }

        /* --- ГАЛЕРЕЯ --- */
        .gallery-wrapper { padding: 40px 50px; transition: filter 0.5s ease; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; }
        .art-card { background: var(--card-bg); border-radius: 16px; overflow: hidden; position: relative; cursor: pointer; border: 1px solid rgba(255,255,255,0.03); transition: 0.4s; animation: fadeIn 0.5s backwards; }
        .art-card:hover { transform: translateY(-8px); border-color: rgba(255,0,127,0.5); box-shadow: 0 15px 30px rgba(0,0,0,0.8), 0 0 15px rgba(255,0,127,0.2); }
        .art-card-img { width: 100%; height: 350px; object-fit: cover; transition: 0.5s; display: block; }
        .art-card:hover .art-card-img { transform: scale(1.05); }
        .art-card-info { padding: 15px; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); position: absolute; bottom: 0; width: 100%; opacity: 0; transition: 0.3s; }
        .art-card:hover .art-card-info { opacity: 1; }
        .art-card-meta { font-size: 16px; color: #fff; display: flex; gap: 20px; align-items: center; justify-content: center; font-weight: bold;}
        .artist-liked-icon { color: var(--primary) !important; text-shadow: var(--glow) !important; }

        .btn-delete { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.7); color: white; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 8px 12px; cursor: pointer; font-size: 16px; z-index: 10; opacity: 0; transition: 0.3s; backdrop-filter: blur(5px); }
        .art-card:hover .btn-delete { opacity: 1; }
        .btn-delete:hover { background: #e74c3c; border-color: #e74c3c; }

        .blurred-gallery { filter: blur(35px) brightness(0.4); pointer-events: none; user-select: none; }
        .loader, .empty-state { text-align: center; padding: 60px; color: var(--text-muted); grid-column: 1/-1;}

        /* --- МОДАЛКИ (ОБЩЕЕ) --- */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 1000; justify-content: center; align-items: center; padding: 20px; overflow-y: auto; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: var(--card-bg); padding: 40px; border-radius: 20px; max-width: 500px; width: 100%; border: 1px solid rgba(255,0,127,0.2); box-shadow: 0 20px 50px rgba(0,0,0,0.8), 0 0 30px rgba(255,0,127,0.1); animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; margin: auto; text-align: center; }
        .modal-content h2 { font-size: 26px; margin-top: 0; color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.2); }
        .modal-close { position: absolute; top: 15px; right: 15px; background: rgba(255,255,255,0.05); border: none; color: var(--text-muted); font-size: 20px; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; z-index: 10;}
        .modal-close:hover { background: var(--primary); color: white; box-shadow: var(--glow); }

        /* --- АДМИН ПАНЕЛЬ (МОДАЛКА) --- */
        .admin-section { background: var(--input-bg); border-radius: 12px; padding: 20px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); text-align: left;}
        .admin-section h3 { margin: 0 0 15px 0; font-size: 16px; color: var(--primary); text-transform: uppercase; letter-spacing: 1px;}
        .admin-input { width: 100%; padding: 12px; background: #000; color: white; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; font-family: 'Outfit'; outline: none; transition: 0.3s; margin-bottom: 10px;}
        .admin-input:focus { border-color: var(--primary); }
        .tab-list-admin { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px;}
        .tab-item-admin { display: flex; justify-content: space-between; align-items: center; background: #000; padding: 10px 15px; border-radius: 8px; font-size: 14px;}
        .tab-item-admin span { color: white; }
        .tab-item-admin button { background: none; border: none; color: #e74c3c; cursor: pointer; font-size: 16px;}

        /* --- AUTH ФОРМА --- */
        .auth-form { text-align: left; margin-top: 25px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .form-group input { width: 100%; padding: 14px 16px; background: var(--input-bg); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; color: var(--text); font-size: 16px; font-family: 'Outfit'; outline: none; transition: 0.3s;}
        .form-group input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(255,0,127,0.2); }
        .form-error { color: var(--primary); font-size: 13px; margin-top: 8px; display: none; text-shadow: 0 0 5px rgba(255,0,127,0.5); }
        .auth-switch { text-align: center; margin-top: 25px; color: var(--text-muted); font-size: 14px; }
        .auth-switch a { color: var(--primary); cursor: pointer; font-weight: 700; transition: 0.2s; }

        /* --- МОДАЛКА ПРОСМОТРА АРТА --- */
        .art-view-modal { max-width: 1000px; padding: 0; overflow: hidden; display: flex; flex-direction: column; background: var(--bg); border: 1px solid rgba(255,255,255,0.05);}
        .art-view-img-wrap { width: 100%; background: #000; display: flex; justify-content: center; align-items: center;}
        .art-view-modal .art-image { width: 100%; max-height: 65vh; object-fit: contain; display: block; }
        .art-view-body { padding: 30px; background: var(--card-bg); flex: 1; display: flex; flex-direction: column;}
        
        .react-row { display: flex; justify-content: center; gap: 20px; padding-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.05); margin-bottom: 20px;}
        .react-btn { background: var(--input-bg); border: 1px solid rgba(255,255,255,0.05); padding: 10px 25px; border-radius: 30px; color: var(--text-muted); font-size: 18px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 8px; font-weight: 600;}
        .react-btn:hover { background: rgba(255,255,255,0.05); color: white; }
        .react-btn.active-heart { border-color: var(--primary); color: var(--primary); box-shadow: inset 0 0 15px rgba(255,0,127,0.2); }
        .react-btn.active-fire { border-color: #ff9f43; color: #ff9f43; box-shadow: inset 0 0 15px rgba(255,159,67,0.2); }

        .comments-list { max-height: 350px; overflow-y: auto; margin-bottom: 20px; padding-right: 10px;}
        .comments-list::-webkit-scrollbar { width: 6px; }
        .comments-list::-webkit-scrollbar-thumb { background: var(--input-bg); border-radius: 3px; }
        
        .comment-item { display: flex; gap: 15px; padding: 15px; background: var(--comment-bg); border-radius: 12px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.02);}
        .comment-item.is-reply { margin-left: 40px; border-left: 3px solid var(--primary); background: rgba(255,0,127,0.02); }
        .comment-avatar { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; border: 1px solid rgba(255,255,255,0.1); }
        .comment-body { flex: 1; }
        .comment-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .comment-author { font-weight: 700; font-size: 14px; color: #fff; }
        .comment-author.admin-name { color: var(--primary); text-shadow: 0 0 5px rgba(255,0,127,0.5); }
        .comment-text { font-size: 15px; line-height: 1.5; color: #ccc; }
        .comment-actions { display: flex; gap: 15px; margin-top: 8px; font-size: 12px; color: var(--text-muted); font-weight: 600;}
        .c-action { cursor: pointer; transition: 0.2s; }
        .c-action:hover { color: white; }
        .c-action.liked { color: var(--primary); }

        .comment-form { display: flex; flex-direction: column; gap: 10px; background: var(--comment-bg); padding: 15px; border-radius: 12px;}
        .reply-badge { display: none; align-items: center; justify-content: space-between; font-size: 12px; color: var(--primary); background: rgba(255,0,127,0.1); padding: 5px 10px; border-radius: 6px; font-weight: bold;}
        .comment-input { flex: 1; padding: 12px; background: var(--input-bg); border: none; border-radius: 8px; color: white; resize: none; outline: none; font-family: 'Outfit';}
        .auth-overlay-msg { text-align: center; padding: 20px; border: 1px dashed rgba(255,0,127,0.3); border-radius: 12px; color: var(--text-muted); }
        .auth-overlay-msg a { color: var(--primary); cursor: pointer; font-weight: bold; }

        .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
        .toast { background: var(--card-bg); color: white; padding: 14px 20px; border-radius: 10px; border: 1px solid rgba(255,0,127,0.3); box-shadow: var(--glow); animation: fadeIn 0.3s ease-out; font-weight: 600;}

        @media (max-width: 768px) {
            header { padding: 20px; }
            .gallery-wrapper { padding: 20px; }
            .header-top { flex-direction: column; gap: 15px; text-align: center;}
            .branding-row { flex-direction: column; }
            .gallery { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px;}
            .art-card-img { height: 200px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-top">
            <div class="branding-row">
                <img src="avatar.jpg" id="mainAvatar" class="site-avatar" onerror="this.src='https://placehold.co/150x150/ff007f/050505?text=G'">
                <div class="site-info">
                    <h1>Габриэль</h1>
                </div>
            </div>
            <div class="auth-zone" id="authZone">
                <button class="btn btn-primary btn-sm" id="btnOpenAuth">Войти в аккаунт</button>
            </div>
        </div>
        <div class="tabs" id="tabsContainer">
            </div>
    </header>

    <div class="gallery-wrapper" id="galleryWrapper">
        <div class="gallery" id="gallery">
            <div class="loader">Подключение к базе данных...</div>
        </div>
    </div>

    <div class="modal-overlay" id="modalAgreement">
        <div class="modal-content">
            <h2 style="color: var(--primary);">🔞 Контент 18+</h2>
            <p>Этот раздел содержит NSFW материалы. Подтвердите, что вам исполнилось 18 лет.</p>
            <div style="display: flex; gap:10px; justify-content:center; margin-top:20px;">
                <button class="btn btn-primary" id="btnAgree">Мне есть 18 лет</button>
                <button class="btn btn-outline" id="btnCancel">Уйти</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modalAuth">
        <div class="modal-content" style="max-width: 400px;">
            <button class="modal-close" id="btnCloseAuth">✕</button>
            <h2 id="authTitle">Вход</h2>
            <div class="auth-form" id="authForm">
                <div class="form-group" id="nicknameGroup" style="display:none;">
                    <label>Твой никнейм</label>
                    <input type="text" id="inputNickname" placeholder="Например: CyberNinja">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="inputEmail" placeholder="mail@example.com">
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="inputPassword" placeholder="••••••••">
                    <div class="form-error" id="authError">Ошибка</div>
                </div>
                <button class="btn btn-primary" style="width:100%; margin-top: 10px;" id="btnAuthSubmit">Войти</button>
                <div class="auth-switch">
                    Нет аккаунта? <a id="authSwitchLink">Создать</a>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modalAdmin">
        <div class="modal-content" style="max-width: 600px;">
            <button class="modal-close" id="btnCloseAdmin">✕</button>
            <h2>Панель управления</h2>
            
            <div class="admin-section">
                <h3>🖼 Добавить арт</h3>
                <input type="text" id="upload-url" class="admin-input" placeholder="Прямая ссылка (URL)...">
                <div style="display:flex; gap:10px;">
                    <select id="upload-category" class="admin-input" style="margin-bottom:0; flex:1;"></select>
                    <button class="btn btn-primary" id="btn-upload">Опубликовать</button>
                </div>
            </div>

            <div class="admin-section">
                <h3>📂 Управление разделами</h3>
                <div class="tab-list-admin" id="adminTabsList"></div>
                <div style="display:flex; gap:10px;">
                    <input type="text" id="new-tab-name" class="admin-input" style="margin-bottom:0; flex:1;" placeholder="Название нового раздела...">
                    <button class="btn btn-outline" id="btn-add-tab">Добавить</button>
                </div>
            </div>

            <div class="admin-section">
                <h3>👤 Сменить аватарку</h3>
                <div style="display:flex; gap:10px;">
                    <input type="text" id="avatar-url" class="admin-input" style="margin-bottom:0; flex:1;" placeholder="Прямая ссылка на фото...">
                    <button class="btn btn-outline" id="btn-save-avatar">Сохранить</button>
                </div>
            </div>

        </div>
    </div>

    <div class="modal-overlay" id="modalArt">
        <div class="modal-content art-view-modal">
            <button class="modal-close" id="btnCloseArt" style="background:rgba(0,0,0,0.5);">✕</button>
            <div class="art-view-img-wrap">
                <img class="art-image" id="artViewImg" src="">
            </div>
            <div class="art-view-body">
                <div class="react-row">
                    <button class="react-btn" id="btn-like">🤍 <span id="lb-hearts">0</span></button>
                    <button class="react-btn" id="btn-fire">🔥 <span id="lb-fires">0</span></button>
                </div>
                <div class="comments-section">
                    <div class="comments-list" id="commentsList"></div>
                    <div id="commentFormWrap"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, collection, doc, getDoc, getDocs, addDoc, deleteDoc, updateDoc, query, where, orderBy, setDoc, arrayUnion, arrayRemove, increment } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC_ztsyKmGRriSJ_iJlgTJCUq_AvxOqHOM",
            authDomain: "lilyshelte.firebaseapp.com",
            projectId: "lilyshelte",
            storageBucket: "lilyshelte.firebasestorage.app",
            messagingSenderId: "778800933672",
            appId: "1:778800933672:web:c8be45ac174157254bfe1d"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // === СОСТОЯНИЕ ===
        let currentUser = null;
        let isAdmin = false;
        let isAdultUser = localStorage.getItem('isAdultUser') === 'true';
        let currentTab = 'safe';
        let isLoginMode = true;
        let artsArray = [];
        let currentArt = null;
        let replyingToId = null; 
        
        let baseTabs = [
            { id: 'safe', name: 'Галерея', is18plus: false },
            { id: '18plus', name: 'Раздел 18+ 🔒', is18plus: true }
        ];
        let allTabs = [...baseTabs];

        const modalAuth = document.getElementById('modalAuth');
        const modalArt = document.getElementById('modalArt');
        const modalAdmin = document.getElementById('modalAdmin');
        const gallery = document.getElementById('gallery');
        const galleryWrapper = document.getElementById('galleryWrapper');
        const tabsContainer = document.getElementById('tabsContainer');

        function showToast(msg, type = 'info') {
            const t = document.createElement('div');
            t.className = `toast`; t.style.borderColor = type === 'error' ? '#ff4757' : 'var(--primary)';
            t.textContent = msg;
            document.getElementById('toastContainer').appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        // === ЗАГРУЗКА НАСТРОЕК ПРОФИЛЯ (Аватар) ===
        async function loadProfileSettings() {
            try {
                const docSnap = await getDoc(doc(db, "settings", "profile"));
                if(docSnap.exists() && docSnap.data().avatarUrl) {
                    document.getElementById('mainAvatar').src = docSnap.data().avatarUrl;
                }
            } catch(e) {}
        }
        loadProfileSettings();

        // === ЗАГРУЗКА И РЕНДЕР ТАБОВ ===
        async function loadTabs() {
            try {
                const snap = await getDocs(collection(db, "custom_tabs"));
                let customTabs = [];
                snap.forEach(d => customTabs.push({ id: d.id, name: d.data().name, is18plus: false }));
                allTabs = [...baseTabs, ...customTabs];
            } catch(e) {}
            renderTabs();
            renderAdminTabs();
            renderUploadCategories();
        }

        function renderTabs() {
            tabsContainer.innerHTML = '';
            allTabs.forEach(tab => {
                const btn = document.createElement('button');
                btn.className = `tab-btn ${tab.id === currentTab ? 'active' : ''}`;
                btn.innerText = tab.name;
                btn.onclick = () => switchTab(tab);
                tabsContainer.appendChild(btn);
            });
        }

        function switchTab(tab) {
            currentTab = tab.id;
            renderTabs();
            loadGallery();
            if(tab.is18plus && !isAdultUser) {
                galleryWrapper.classList.add('blurred-gallery');
                document.getElementById('modalAgreement').classList.add('active');
            } else {
                galleryWrapper.classList.remove('blurred-gallery');
            }
        }

        // === АВТОРИЗАЦИЯ ===
        document.getElementById('btnOpenAuth').onclick = () => { isLoginMode = true; updateAuthForm(); modalAuth.classList.add('active'); };
        document.getElementById('btnCloseAuth').onclick = () => modalAuth.classList.remove('active');
        document.getElementById('authSwitchLink').onclick = () => { isLoginMode = !isLoginMode; updateAuthForm(); };

        function updateAuthForm() {
            document.getElementById('authTitle').textContent = isLoginMode ? 'Вход' : 'Регистрация';
            document.getElementById('btnAuthSubmit').textContent = isLoginMode ? 'Войти' : 'Создать аккаунт';
            document.getElementById('authSwitchLink').textContent = isLoginMode ? 'Регистрация' : 'Уже есть аккаунт? Войти';
            document.getElementById('nicknameGroup').style.display = isLoginMode ? 'none' : 'block';
            document.getElementById('authError').style.display = 'none';
        }

        document.getElementById('btnAuthSubmit').onclick = async () => {
            const email = document.getElementById('inputEmail').value.trim();
            const password = document.getElementById('inputPassword').value;
            const nickname = document.getElementById('inputNickname').value.trim();
            const err = document.getElementById('authError'); err.style.display = 'none';

            try {
                if (isLoginMode) { await signInWithEmailAndPassword(auth, email, password); } 
                else {
                    if (!nickname) { err.textContent = 'Укажи никнейм'; err.style.display = 'block'; return; }
                    const cred = await createUserWithEmailAndPassword(auth, email, password);
                    await updateProfile(cred.user, { displayName: nickname });
                    await setDoc(doc(db, 'users', cred.user.uid), { admin: false, name: nickname });
                }
                modalAuth.classList.remove('active'); showToast(isLoginMode ? 'С возвращением!' : 'Аккаунт создан!');
            } catch (e) { err.textContent = 'Ошибка данных. Проверь почту и пароль.'; err.style.display = 'block'; }
        };

        onAuthStateChanged(auth, async (user) => {
            currentUser = user; isAdmin = false;
            const zone = document.getElementById('authZone');
            if (user) {
                try {
                    const uDoc = await getDoc(doc(db, 'users', user.uid));
                    if (uDoc.exists()) isAdmin = uDoc.data().admin === true;
                } catch(e) {}
                
                let adminBtnHTML = isAdmin ? `<span class="admin-badge" id="btnOpenAdmin">⚙ Настройки</span>` : '';
                zone.innerHTML = `
                    <div class="user-badge">
                        <span class="username">${user.displayName || "User"}</span>
                        ${adminBtnHTML}
                    </div>
                    <button class="btn btn-outline btn-sm" id="btnLogout">Выйти</button>
                `;
                document.getElementById('btnLogout').onclick = () => signOut(auth);
                if(isAdmin) document.getElementById('btnOpenAdmin').onclick = () => modalAdmin.classList.add('active');
            } else {
                zone.innerHTML = `<button class="btn btn-primary btn-sm" id="btnOpenAuth">Вход / Рега</button>`;
                document.getElementById('btnOpenAuth').onclick = () => { isLoginMode = true; updateAuthForm(); modalAuth.classList.add('active'); };
            }
            loadGallery();
        });

        // === АДМИНКА ===
        document.getElementById('btnCloseAdmin').onclick = () => modalAdmin.classList.remove('active');

        // Смена аватарки
        document.getElementById('btn-save-avatar').onclick = async () => {
            const url = document.getElementById('avatar-url').value.trim();
            if(!url) return;
            await setDoc(doc(db, "settings", "profile"), { avatarUrl: url }, { merge: true });
            document.getElementById('mainAvatar').src = url;
            document.getElementById('avatar-url').value = '';
            showToast('Аватар обновлен!', 'success');
        };

        // Загрузка арта (выпадающий список динамический)
        function renderUploadCategories() {
            const sel = document.getElementById('upload-category');
            sel.innerHTML = '';
            allTabs.forEach(t => {
                const opt = document.createElement('option');
                opt.value = t.id; opt.innerText = t.name;
                sel.appendChild(opt);
            });
        }

        document.getElementById('btn-upload').onclick = async () => {
            const url = document.getElementById('upload-url').value.trim();
            const type = document.getElementById('upload-category').value;
            if(!url) return showToast('Вставьте ссылку!', 'error');
            try {
                await addDoc(collection(db, "artworks"), { url, type, hearts: 0, fires: 0, commentsCount: 0, heartedBy: [], firedBy: [], artistLiked: false, createdAt: Date.now() });
                document.getElementById('upload-url').value = '';
                showToast('Опубликовано!'); loadGallery();
            } catch (e) { showToast('Ошибка', 'error'); }
        };

        // Управление табами
        function renderAdminTabs() {
            const list = document.getElementById('adminTabsList'); list.innerHTML = '';
            allTabs.forEach(t => {
                const isBase = (t.id === 'safe' || t.id === '18plus');
                list.innerHTML += `
                    <div class="tab-item-admin">
                        <span>${t.name} ${isBase ? '(Базовый)' : ''}</span>
                        ${!isBase ? `<button onclick="deleteTab('${t.id}')">Удалить</button>` : '<span>🔒</span>'}
                    </div>`;
            });
        }

        document.getElementById('btn-add-tab').onclick = async () => {
            const name = document.getElementById('new-tab-name').value.trim();
            if(!name) return;
            await addDoc(collection(db, "custom_tabs"), { name });
            document.getElementById('new-tab-name').value = '';
            await loadTabs(); showToast('Раздел создан!');
        };

        window.deleteTab = async (id) => {
            if(!confirm('Точно удалить раздел?')) return;
            await deleteDoc(doc(db, "custom_tabs", id));
            if(currentTab === id) switchTab(baseTabs[0]);
            await loadTabs(); showToast('Удалено');
        };

        // === ГАЛЕРЕЯ И СОРТИРОВКА ===
        async function loadGallery() {
            gallery.innerHTML = '<div class="loader">Связь с базой...</div>';
            artsArray = [];
            try {
                const q = query(collection(db, "artworks"), where("type", "==", currentTab));
                const snap = await getDocs(q);
                gallery.innerHTML = '';
                if (snap.empty) { gallery.innerHTML = '<div class="empty-state">Нет артов.</div>'; return; }

                snap.forEach(d => {
                    let art = d.data(); art.id = d.id;
                    art.hearts = art.hearts || 0; art.fires = art.fires || 0;
                    art.score = art.hearts + (art.fires * 0.5); 
                    artsArray.push(art);
                });

                artsArray.sort((a,b) => b.score - a.score);

                artsArray.forEach((art, index) => {
                    const card = document.createElement('div');
                    card.className = 'art-card';
                    card.style.animationDelay = `${index * 0.05}s`;
                    
                    let delBtn = isAdmin ? `<button class="btn-delete">✕</button>` : '';
                    let heartIcon = art.artistLiked ? `<span class="artist-liked-icon">❤️</span>` : `🤍`;

                    card.innerHTML = `
                        ${delBtn}
                        <img class="art-card-img" src="${art.url}" loading="lazy">
                        <div class="art-card-info">
                            <div class="art-card-meta">
                                <span>${heartIcon} ${art.hearts}</span> <span>🔥 ${art.fires}</span> <span>💬 ${art.commentsCount || 0}</span>
                            </div>
                        </div>
                    `;
                    card.onclick = (e) => {
                        if(e.target.classList.contains('btn-delete')) {
                            if(confirm('Удалить арт навсегда?')) { deleteDoc(doc(db, "artworks", art.id)).then(()=>loadGallery()); }
                            return;
                        }
                        openArt(index);
                    };
                    gallery.appendChild(card);
                });
            } catch (e) { gallery.innerHTML = '<div class="empty-state">Ошибка загрузки.</div>'; }
        }

        // === МОДАЛКИ (Возраст) ===
        document.getElementById('btnAgree').onclick = () => { localStorage.setItem('isAdultUser', 'true'); isAdultUser = true; document.getElementById('modalAgreement').classList.remove('active'); galleryWrapper.classList.remove('blurred-gallery'); };
        document.getElementById('btnCancel').onclick = () => { document.getElementById('modalAgreement').classList.remove('active'); document.getElementById('tab-safe').click(); };

        // === ПРОСМОТР АРТА ===
        function openArt(index) {
            currentArt = artsArray[index];
            document.getElementById('artViewImg').src = currentArt.url;
            updateReactionButtons();
            modalArt.classList.add('active');
            
            const wrap = document.getElementById('commentFormWrap');
            if(currentUser) {
                wrap.innerHTML = `
                    <div class="comment-form">
                        <div class="reply-badge" id="replyBadge">Ответ пользователю <button id="cancelReply" style="background:none;border:none;color:inherit;cursor:pointer;">✕</button></div>
                        <textarea class="comment-input" id="c-input" rows="2" placeholder="Оставить комментарий..."></textarea>
                        <div class="send-row"><button class="btn btn-primary btn-sm" id="btn-send-c">Отправить</button></div>
                    </div>`;
                document.getElementById('btn-send-c').onclick = sendComment;
                document.getElementById('cancelReply').onclick = () => { replyingToId = null; document.getElementById('replyBadge').style.display='none'; document.getElementById('c-input').value=''; };
            } else {
                wrap.innerHTML = `<div class="auth-overlay-msg">Чтобы ставить реакции и писать комментарии, <br><a id="msgAuthLink">войдите в аккаунт</a></div>`;
                document.getElementById('msgAuthLink').onclick = () => { modalArt.classList.remove('active'); modalAuth.classList.add('active'); };
            }
            loadComments(currentArt.id);
        }
        document.getElementById('btnCloseArt').onclick = () => { modalArt.classList.remove('active'); replyingToId = null; };

        // === УМНЫЕ РЕАКЦИИ ===
        function updateReactionButtons() {
            const btnLike = document.getElementById('btn-like');
            const btnFire = document.getElementById('btn-fire');
            
            let heartLabel = currentArt.artistLiked ? '❤️' : '🤍';
            if (currentArt.artistLiked) { btnLike.style.color = "var(--primary)"; btnLike.style.textShadow = "var(--glow)"; } 
            else { btnLike.style.color = ""; btnLike.style.textShadow = ""; }

            btnLike.innerHTML = `${heartLabel} <span id="lb-hearts">${currentArt.hearts}</span>`;
            btnFire.innerHTML = `🔥 <span id="lb-fires">${currentArt.fires}</span>`;

            if(currentUser) {
                const hasHeart = (currentArt.heartedBy || []).includes(currentUser.uid);
                const hasFire = (currentArt.firedBy || []).includes(currentUser.uid);
                btnLike.className = hasHeart ? 'react-btn active-heart' : 'react-btn';
                btnFire.className = hasFire ? 'react-btn active-fire' : 'react-btn';
                if(hasHeart && !currentArt.artistLiked) btnLike.innerHTML = `❤️ <span id="lb-hearts">${currentArt.hearts}</span>`;
            } else {
                btnLike.className = 'react-btn'; btnFire.className = 'react-btn';
            }
        }

        async function toggleReact(type) {
            if(!currentUser) { showToast('Нужно войти в аккаунт!', 'error'); return; }
            const artRef = doc(db, "artworks", currentArt.id);
            const uid = currentUser.uid;
            let hearted = (currentArt.heartedBy || []).includes(uid);
            let fired = (currentArt.firedBy || []).includes(uid);

            if(type === 'heart') {
                if(hearted) { 
                    currentArt.hearts--; currentArt.heartedBy = currentArt.heartedBy.filter(id => id !== uid);
                    let updateData = { hearts: increment(-1), heartedBy: arrayRemove(uid) };
                    if(isAdmin) { currentArt.artistLiked = false; updateData.artistLiked = false; }
                    await updateDoc(artRef, updateData);
                } else { 
                    currentArt.hearts++; currentArt.heartedBy.push(uid);
                    let updateData = { hearts: increment(1), heartedBy: arrayUnion(uid) };
                    if(fired) { currentArt.fires--; currentArt.firedBy = currentArt.firedBy.filter(id => id !== uid); updateData.fires = increment(-1); updateData.firedBy = arrayRemove(uid); }
                    if(isAdmin) { currentArt.artistLiked = true; updateData.artistLiked = true; }
                    await updateDoc(artRef, updateData);
                }
            } else if (type === 'fire') {
                if(fired) { 
                    currentArt.fires--; currentArt.firedBy = currentArt.firedBy.filter(id => id !== uid);
                    await updateDoc(artRef, { fires: increment(-1), firedBy: arrayRemove(uid) });
                } else { 
                    currentArt.fires++; currentArt.firedBy.push(uid);
                    let updateData = { fires: increment(1), firedBy: arrayUnion(uid) };
                    if(hearted) { currentArt.hearts--; currentArt.heartedBy = currentArt.heartedBy.filter(id => id !== uid); updateData.hearts = increment(-1); updateData.heartedBy = arrayRemove(uid); }
                    if(isAdmin && hearted) { currentArt.artistLiked = false; updateData.artistLiked = false; } 
                    await updateDoc(artRef, updateData);
                }
            }
            updateReactionButtons(); loadGallery(); 
        }

        document.getElementById('btn-like').onclick = () => toggleReact('heart');
        document.getElementById('btn-fire').onclick = () => toggleReact('fire');

        // === КОММЕНТЫ ===
        async function sendComment() {
            const input = document.getElementById('c-input');
            const text = input.value.trim();
            if(!text) return;
            const name = currentUser.displayName || "User";
            await addDoc(collection(db, "artworks", currentArt.id, "comments"), { 
                user: name, uid: currentUser.uid, text, at: Date.now(),
                parentId: replyingToId, likes: 0, likedBy: []
            });
            await updateDoc(doc(db, "artworks", currentArt.id), { commentsCount: increment(1) });
            input.value = ''; replyingToId = null; document.getElementById('replyBadge').style.display='none';
            loadComments(currentArt.id); loadGallery();
        }

        async function loadComments(id) {
            const list = document.getElementById('commentsList'); list.innerHTML = '';
            const q = query(collection(db, "artworks", id, "comments"), orderBy("at", "asc"));
            const snap = await getDocs(q);
            if(snap.empty) { list.innerHTML = '<div style="color:var(--text-muted); text-align:center;">Пока нет комментариев.</div>'; return; }
            
            let allComments = [];
            snap.forEach(d => { let c = d.data(); c.id = d.id; allComments.push(c); });

            let topLevel = allComments.filter(c => !c.parentId);
            let replies = allComments.filter(c => c.parentId);

            topLevel.forEach(parent => {
                list.appendChild(createCommentNode(parent, false));
                let childs = replies.filter(r => r.parentId === parent.id);
                childs.forEach(child => list.appendChild(createCommentNode(child, true)));
            });
            list.scrollTop = list.scrollHeight;
        }

        function createCommentNode(c, isReply) {
            const div = document.createElement('div');
            div.className = isReply ? 'comment-item is-reply' : 'comment-item';
            
            let isLiked = currentUser && (c.likedBy || []).includes(currentUser.uid);
            let likeClass = isLiked ? 'c-action liked' : 'c-action';
            let adminClass = (c.user === 'Габриэль' || c.user === 'Admin') ? 'admin-name' : '';

            div.innerHTML = `
                <img class="comment-avatar" src="https://placehold.co/40x40/ff007f/111?text=${c.user[0]}">
                <div class="comment-body">
                    <div class="comment-header">
                        <span class="comment-author ${adminClass}">${c.user}</span>
                        ${isAdmin ? `<span class="c-action" style="color:red" data-del="${c.id}">✕</span>` : ''}
                    </div>
                    <div class="comment-text">${isReply ? `<span style="color:var(--primary);">@Ответ</span> ` : ''}${c.text}</div>
                    <div class="comment-actions">
                        <span class="${likeClass}" data-like="${c.id}">❤️ ${c.likes || 0}</span>
                        ${!isReply && currentUser ? `<span class="c-action" data-reply="${c.id}">Ответить</span>` : ''}
                    </div>
                </div>
            `;

            div.querySelector(`[data-like]`).onclick = async () => {
                if(!currentUser) return;
                const cRef = doc(db, "artworks", currentArt.id, "comments", c.id);
                if(isLiked) { await updateDoc(cRef, { likes: increment(-1), likedBy: arrayRemove(currentUser.uid) }); }
                else { await updateDoc(cRef, { likes: increment(1), likedBy: arrayUnion(currentUser.uid) }); }
                loadComments(currentArt.id);
            };

            if(!isReply && currentUser) {
                div.querySelector(`[data-reply]`).onclick = () => {
                    replyingToId = c.id;
                    document.getElementById('replyBadge').style.display='flex';
                    document.getElementById('replyBadge').innerHTML = `Ответ ${c.user} <button id="cancelReply" style="background:none;border:none;color:inherit;cursor:pointer;">✕</button>`;
                    document.getElementById('cancelReply').onclick = () => { replyingToId = null; document.getElementById('replyBadge').style.display='none'; };
                    document.getElementById('c-input').focus();
                };
            }

            if(isAdmin) {
                div.querySelector(`[data-del]`).onclick = async () => {
                    await deleteDoc(doc(db, "artworks", currentArt.id, "comments", c.id));
                    await updateDoc(doc(db, "artworks", currentArt.id), { commentsCount: increment(-1) });
                    loadComments(currentArt.id); loadGallery();
                };
            }
            return div;
        }

        window.onclick = (e) => {
            if (e.target == modalAuth) modalAuth.classList.remove('active');
            if (e.target == modalArt) { modalArt.classList.remove('active'); replyingToId = null; }
            if (e.target == modalAdmin) modalAdmin.classList.remove('active');
        }

        loadTabs();
    </script>
</body>
</html>
