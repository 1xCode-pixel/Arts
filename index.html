<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Габриэль | lilyshelte</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #b026ff;
            --secondary: #ff007f;
            --bg: #050508;
            --card-bg: #111116;
            --text: #f1f1f6;
            --text-muted: #8b8b9e;
            --danger: #ff4757;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0; padding: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- АНИМАЦИИ --- */
        @keyframes fadeSlide { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes popIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        /* --- ШАПКА (Уезжает при скролле) --- */
        header {
            padding: 30px 50px;
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: fadeSlide 0.8s ease-out;
        }

        .header-left { display: flex; align-items: center; gap: 20px; }
        .site-avatar {
            width: 80px; height: 80px; border-radius: 50%; object-fit: cover;
            border: 2px solid var(--primary);
            box-shadow: 0 0 15px rgba(176, 38, 255, 0.3);
        }
        .artist-name { font-family: 'Caveat', cursive; font-size: 2.5rem; margin: 0; background: linear-gradient(90deg, var(--primary), var(--secondary)); -webkit-background-clip: text; color: transparent; }

        /* --- КНОПКИ --- */
        .btn {
            padding: 10px 20px; border: none; border-radius: 30px;
            cursor: pointer; font-weight: 600; font-size: 14px;
            transition: all 0.3s ease;
        }
        .btn-gradient { background: linear-gradient(90deg, var(--primary), var(--secondary)); color: white; }
        .btn-gradient:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 0, 127, 0.4); }
        .btn-outline { background: transparent; border: 1px solid var(--text-muted); color: var(--text); }

        /* --- ПАНЕЛЬ АДМИНА --- */
        #admin-panel {
            display: none; margin: 40px auto; max-width: 800px;
            padding: 20px; background: var(--card-bg);
            border: 2px solid var(--primary); border-radius: 20px;
            text-align: center; animation: popIn 0.5s ease;
        }
        .admin-input { 
            width: 100%; padding: 12px; margin-bottom: 15px; 
            background: #000; border: 1px solid #333; border-radius: 10px; color: white;
        }

        /* --- ТАБЫ --- */
        .tabs { display: flex; justify-content: center; gap: 30px; margin: 40px 0; }
        .tab-btn {
            background: none; border: none; color: var(--text-muted);
            font-size: 1.2rem; font-weight: 600; cursor: pointer;
            padding: 10px 0; position: relative; transition: 0.3s;
        }
        .tab-btn.active { color: var(--text); }
        .tab-btn.active::after {
            content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 3px;
            background: var(--primary); border-radius: 3px;
        }

        /* --- ГАЛЕРЕЯ --- */
        .gallery-wrapper { padding: 0 40px 60px; }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }
        .art-card {
            background: var(--card-bg); border-radius: 16px; overflow: hidden;
            position: relative; transition: transform 0.4s ease;
            animation: fadeSlide 0.6s ease-out backwards;
            cursor: pointer; border: 1px solid rgba(255,255,255,0.05);
        }
        .art-card:hover { transform: translateY(-10px); border-color: var(--primary); }
        .art-card img { width: 100%; height: 350px; object-fit: cover; transition: 0.5s; }
        .art-card:hover img { transform: scale(1.05); }

        .art-stats {
            position: absolute; bottom: 0; width: 100%;
            background: rgba(0,0,0,0.7); padding: 15px;
            display: flex; justify-content: space-around; opacity: 0; transition: 0.3s;
        }
        .art-card:hover .art-stats { opacity: 1; }

        /* --- ЛАЙТБОКС (ПОЛНЫЙ ЭКРАН) --- */
        #lightbox {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.98); z-index: 10000;
            overflow-y: auto;
        }
        .lb-close {
            position: fixed; top: 20px; right: 20px;
            width: 50px; height: 50px; background: rgba(255,255,255,0.1);
            border-radius: 50%; color: white; font-size: 30px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 10001;
        }
        .lb-content {
            display: flex; flex-direction: column; align-items: center;
            padding: 60px 20px; min-height: 100vh;
        }
        .lb-img-wrap { position: relative; width: 100%; max-width: 900px; display: flex; justify-content: center; }
        .lb-img {
            max-width: 100%; max-height: 80vh; object-fit: contain;
            border-radius: 12px; box-shadow: 0 0 50px rgba(0,0,0,0.5);
            touch-action: none; transition: transform 0.2s ease-out;
        }
        .lb-arrow {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(255,255,255,0.1); border: none; color: white;
            width: 60px; height: 60px; border-radius: 50%; font-size: 30px; cursor: pointer;
        }
        .lb-arrow-left { left: -80px; } .lb-arrow-right { right: -80px; }

        .lb-details {
            width: 100%; max-width: 800px; margin-top: 30px;
            background: var(--card-bg); border-radius: 20px; padding: 30px;
        }
        .comment-item {
            padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex; gap: 15px;
        }
        .comment-item strong { color: var(--primary); }

        /* --- МОБИЛКИ --- */
        @media (max-width: 768px) {
            header { padding: 20px; flex-direction: column; gap: 15px; }
            .lb-arrow { display: none; }
            .gallery { grid-template-columns: repeat(2, 1fr); gap: 15px; }
            .art-card { height: 250px; }
            .art-card img { height: 100%; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <img src="avatar.jpg" alt="Габриэль" class="site-avatar" onerror="this.src='https://placehold.co/100x100/b026ff/fff?text=G'">
            <h1 class="artist-name">Габриэль</h1>
        </div>
        <div id="auth-zone">
            <button class="btn btn-gradient" id="btn-login">Вход</button>
        </div>
    </header>

    <div id="admin-panel">
        <h2 style="color: var(--primary)">Добавить новый арт</h2>
        <input type="text" id="new-art-url" class="admin-input" placeholder="Прямая ссылка на картинку (URL)...">
        <div style="display: flex; gap: 10px;">
            <select id="new-art-type" class="admin-input" style="flex: 1">
                <option value="safe">Обычный арт</option>
                <option value="18plus">Арт 18+ 🔒</option>
            </select>
            <button class="btn btn-gradient" id="btn-upload" style="height: 45px;">Опубликовать</button>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" id="tab-safe">Галерея</button>
        <button class="tab-btn" id="tab-18plus">Раздел 18+</button>
    </div>

    <div class="gallery-wrapper">
        <div class="gallery" id="gallery">
            <div class="loader" style="grid-column: 1/-1; text-align: center; padding: 50px; color: var(--text-muted);">
                Подключение к lilyshelte...
            </div>
        </div>
    </div>

    <div id="lightbox">
        <div class="lb-close" onclick="closeLightbox()">✕</div>
        <div class="lb-content">
            <div class="lb-img-wrap">
                <button class="lb-arrow lb-arrow-left" onclick="changeImage(-1)">❮</button>
                <img id="lb-img" class="lb-img" src="" alt="">
                <button class="lb-arrow lb-arrow-right" onclick="changeImage(1)">❯</button>
            </div>
            
            <div class="lb-details">
                <div style="display:flex; justify-content:center; gap:20px; padding-bottom:20px; border-bottom:1px solid #333;">
                    <button class="btn btn-outline" id="btn-like">❤️ <span id="lb-hearts">0</span></button>
                    <button class="btn btn-outline" id="btn-fire">🔥 <span id="lb-fires">0</span></button>
                </div>
                <div id="lb-comments" style="margin-top: 20px; max-height: 300px; overflow-y: auto;">
                    </div>
                <div style="display:flex; gap:10px; margin-top:20px;">
                    <input type="text" id="comment-input" class="admin-input" placeholder="Напишите что-нибудь..." style="margin:0;">
                    <button class="btn btn-gradient" id="btn-send-comment">➤</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, doc, getDoc, updateDoc, increment, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC_ztsyKmGRriSJ_iJlgTJCUq_AvxOqHOM",
            authDomain: "lilyshelte.firebaseapp.com",
            projectId: "lilyshelte",
            storageBucket: "lilyshelte.firebasestorage.app",
            messagingSenderId: "778800933672",
            appId: "1:778800933672:web:c8be45ac174157254bfe1d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let artsArray = [];
        let currentArtIndex = 0;
        let currentTab = 'safe';

        // --- ЛОГИКА ВХОДА ---
        document.getElementById('btn-login').onclick = () => {
            signInWithPopup(auth, new GoogleAuthProvider()).catch(e => alert("Вход через Google работает только на Vercel!"));
        };

        onAuthStateChanged(auth, async (user) => {
            currentUser = user;
            const zone = document.getElementById('auth-zone');
            if (user) {
                zone.innerHTML = `<button class="btn btn-outline" id="btn-logout">Выйти (${user.displayName.split(' ')[0]})</button>`;
                document.getElementById('btn-logout').onclick = () => signOut(auth);
                
                // Проверка на админа
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists() && userDoc.data().admin === true) {
                    document.getElementById('admin-panel').style.display = 'block';
                }
            } else {
                zone.innerHTML = `<button class="btn btn-gradient" id="btn-login">Вход</button>`;
                document.getElementById('admin-panel').style.display = 'none';
            }
        });

        // --- ЗАГРУЗКА ГАЛЕРЕИ ---
        async function loadGallery() {
            const container = document.getElementById('gallery');
            container.innerHTML = '<div style="grid-column:1/-1; text-align:center">Загрузка...</div>';
            artsArray = [];

            try {
                const q = query(collection(db, "artworks"), where("type", "==", currentTab));
                const snap = await getDocs(q);
                
                container.innerHTML = '';
                if (snap.empty) { container.innerHTML = '<div style="grid-column:1/-1; text-align:center">Тут пока пусто.</div>'; return; }

                snap.forEach(d => {
                    let art = d.data(); art.id = d.id;
                    art.hearts = art.hearts || 0; art.fires = art.fires || 0;
                    art.score = art.hearts + (art.fires * 0.5);
                    artsArray.push(art);
                });

                artsArray.sort((a, b) => b.score - a.score);

                artsArray.forEach((art, index) => {
                    const card = document.createElement('div');
                    card.className = 'art-card';
                    card.onclick = () => openLightbox(index);
                    card.innerHTML = `
                        <img src="${art.url}" loading="lazy">
                        <div class="art-stats">
                            <span>❤️ ${art.hearts}</span> <span>🔥 ${art.fires}</span>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (e) { container.innerHTML = 'Ошибка подключения к базе.'; }
        }

        // --- АДМИНКА ---
        document.getElementById('btn-upload').onclick = async () => {
            const url = document.getElementById('new-art-url').value.trim();
            const type = document.getElementById('new-art-type').value;
            if (!url) return;

            await addDoc(collection(db, "artworks"), {
                url, type, hearts: 0, fires: 0, createdAt: Date.now()
            });
            document.getElementById('new-art-url').value = '';
            loadGallery();
        };

        // --- ЛАЙТБОКС ---
        const lb = document.getElementById('lightbox');
        const lbImg = document.getElementById('lb-img');
        let zoom = 1;

        window.openLightbox = (index) => {
            currentArtIndex = index;
            updateLightbox();
            lb.style.display = 'block';
            document.body.style.overflow = 'hidden';
        };

        window.closeLightbox = () => {
            lb.style.display = 'none';
            document.body.style.overflow = 'auto';
        };

        window.changeImage = (dir) => {
            currentArtIndex += dir;
            if (currentArtIndex < 0) currentArtIndex = artsArray.length - 1;
            if (currentArtIndex >= artsArray.length) currentArtIndex = 0;
            updateLightbox();
        };

        function updateLightbox() {
            const art = artsArray[currentArtIndex];
            lbImg.src = art.url;
            zoom = 1; lbImg.style.transform = `scale(1)`;
            document.getElementById('lb-hearts').innerText = art.hearts;
            document.getElementById('lb-fires').innerText = art.fires;
            loadComments(art.id);
        }

        // Зум
        lbImg.onwheel = (e) => {
            e.preventDefault(); zoom += e.deltaY * -0.001;
            zoom = Math.min(Math.max(1, zoom), 4);
            lbImg.style.transform = `scale(${zoom})`;
        };

        // Реакции
        document.getElementById('btn-like').onclick = async () => {
            if (!currentUser) return alert("Войдите!");
            const art = artsArray[currentArtIndex];
            art.hearts++; document.getElementById('lb-hearts').innerText = art.hearts;
            await updateDoc(doc(db, "artworks", art.id), { hearts: increment(1) });
        };

        document.getElementById('btn-fire').onclick = async () => {
            if (!currentUser) return alert("Войдите!");
            const art = artsArray[currentArtIndex];
            art.fires++; document.getElementById('lb-fires').innerText = art.fires;
            await updateDoc(doc(db, "artworks", art.id), { fires: increment(1) });
        };

        // Комменты
        async function loadComments(id) {
            const list = document.getElementById('lb-comments');
            list.innerHTML = '';
            const q = query(collection(db, "artworks", id, "comments"), orderBy("at", "asc"));
            const snap = await getDocs(q);
            snap.forEach(d => {
                const c = d.data();
                list.innerHTML += `<div class="comment-item"><strong>${c.user}</strong>: ${c.text}</div>`;
            });
        }

        document.getElementById('btn-send-comment').onclick = async () => {
            const input = document.getElementById('comment-input');
            const text = input.value.trim();
            if (!text || !currentUser) return;
            const art = artsArray[currentArtIndex];
            await addDoc(collection(db, "artworks", art.id, "comments"), {
                user: currentUser.displayName, text, at: Date.now()
            });
            input.value = ''; loadComments(art.id);
        };

        // Вкладки
        document.getElementById('tab-safe').onclick = () => { currentTab = 'safe'; loadGallery(); };
        document.getElementById('tab-18plus').onclick = () => { currentTab = '18plus'; loadGallery(); };

        loadGallery();
    </script>
</body>
</html>
