<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Габриэль | lilyshelte</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #b026ff; --secondary: #ff007f; --bg: #050508; --card-bg: #111116; --text: #f1f1f6; --text-muted: #8b8b9e; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; min-height: 100vh; }

        /* --- ШАПКА --- */
        header { 
            padding: 20px 40px; background: rgba(10, 10, 15, 0.9); backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center;
        }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .site-avatar { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--primary); object-fit: cover; }
        .artist-name { font-family: 'Caveat', cursive; font-size: 2rem; margin: 0; background: linear-gradient(90deg, var(--primary), var(--secondary)); -webkit-background-clip: text; color: transparent; }

        /* --- КНОПКИ --- */
        .btn { padding: 10px 20px; border: none; border-radius: 30px; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .btn-gradient { background: linear-gradient(90deg, var(--primary), var(--secondary)); color: white; }
        .btn-outline { background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.1); }

        /* --- ПАНЕЛЬ АДМИНА --- */
        #admin-panel { display: none; max-width: 800px; margin: 20px auto; padding: 20px; background: var(--card-bg); border: 2px solid var(--primary); border-radius: 20px; text-align: center; }
        .admin-input { width: 100%; padding: 12px; margin-bottom: 10px; background: #000; border: 1px solid #333; border-radius: 10px; color: white; }

        /* --- ГАЛЕРЕЯ --- */
        .tabs { display: flex; justify-content: center; gap: 20px; margin: 30px 0; }
        .tab-btn { background: none; border: none; color: var(--text-muted); font-size: 1.1rem; cursor: pointer; padding: 5px 15px; }
        .tab-btn.active { color: white; border-bottom: 2px solid var(--primary); }

        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; padding: 0 40px 40px; }
        .art-card { background: var(--card-bg); border-radius: 16px; overflow: hidden; cursor: pointer; transition: 0.3s; border: 1px solid #222; }
        .art-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .art-card img { width: 100%; height: 300px; object-fit: cover; }
        .art-stats { padding: 15px; display: flex; justify-content: space-around; font-size: 14px; background: rgba(0,0,0,0.3); }

        /* --- ЛАЙТБОКС --- */
        #lightbox { display: none; position: fixed; inset: 0; background: #000; z-index: 10000; overflow-y: auto; }
        .lb-close { position: fixed; top: 20px; right: 20px; width: 45px; height: 45px; background: rgba(255,255,255,0.1); border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 10002; font-size: 24px; }
        .lb-wrap { display: flex; flex-direction: column; align-items: center; padding: 40px 10px; }
        .lb-stage { position: relative; width: 100%; max-width: 900px; display: flex; align-items: center; justify-content: center; }
        .lb-img { max-width: 100%; max-height: 80vh; border-radius: 8px; box-shadow: 0 0 40px rgba(0,0,0,0.5); transition: 0.2s; }
        .lb-arrow { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.1); color: white; border: none; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; font-size: 20px; }
        .lb-prev { left: 10px; } .lb-next { right: 10px; }

        .lb-details { width: 100%; max-width: 700px; margin-top: 20px; background: var(--card-bg); border-radius: 15px; padding: 20px; }
        .comment-item { padding: 10px; border-bottom: 1px solid #222; font-size: 14px; }
        .comment-item strong { color: var(--primary); margin-right: 10px; }

        @media (max-width: 768px) {
            header { padding: 20px; }
            .gallery { grid-template-columns: repeat(2, 1fr); padding: 0 15px; gap: 15px; }
            .art-card img { height: 200px; }
            .lb-arrow { display: none; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <img src="avatar.jpg" class="site-avatar" onerror="this.src='https://placehold.co/100x100/b026ff/fff?text=G'">
        <h1 class="artist-name">Габриэль</h1>
    </div>
    <div id="auth-box">
        <button class="btn btn-gradient" id="btn-login">Вход</button>
    </div>
</header>

<div id="admin-panel">
    <input type="text" id="art-url" class="admin-input" placeholder="Ссылка на арт (URL)...">
    <select id="art-type" class="admin-input">
        <option value="safe">Обычный</option>
        <option value="18plus">18+</option>
    </select>
    <button class="btn btn-gradient" id="btn-upload">Опубликовать</button>
</div>

<div class="tabs">
    <button class="tab-btn active" id="tab-safe">Галерея</button>
    <button class="tab-btn" id="tab-18plus">Раздел 18+</button>
</div>

<div class="gallery" id="gallery"></div>

<div id="lightbox">
    <div class="lb-close" onclick="closeLightbox()">✕</div>
    <div class="lb-wrap">
        <div class="lb-stage">
            <button class="lb-arrow lb-prev" onclick="changeImage(-1)">❮</button>
            <img id="lb-img" class="lb-img" src="">
            <button class="lb-arrow lb-next" onclick="changeImage(1)">❯</button>
        </div>
        <div class="lb-details">
            <div style="display:flex; justify:center; gap:20px; margin-bottom:20px;">
                <button class="btn btn-outline" id="btn-like">❤️ <span id="l-count">0</span></button>
                <button class="btn btn-outline" id="btn-fire">🔥 <span id="f-count">0</span></button>
            </div>
            <div id="comments-box" style="max-height: 250px; overflow-y: auto;"></div>
            <div style="display:flex; gap:10px; margin-top:15px;">
                <input type="text" id="c-input" class="admin-input" placeholder="Твой коммент..." style="margin:0">
                <button class="btn btn-gradient" id="btn-send">➤</button>
            </div>
        </div>
    </div>
</div>

<script>
    // --- КОНФИГ ---
    const firebaseConfig = {
        apiKey: "AIzaSyC_ztsyKmGRriSJ_iJlgTJCUq_AvxOqHOM",
        authDomain: "lilyshelte.firebaseapp.com",
        projectId: "lilyshelte",
        storageBucket: "lilyshelte.firebasestorage.app",
        messagingSenderId: "778800933672",
        appId: "1:778800933672:web:c8be45ac174157254bfe1d"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let user = null;
    let arts = [];
    let curIdx = 0;
    let curTab = 'safe';

    // --- ВХОД ---
    document.getElementById('btn-login').onclick = () => {
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithPopup(provider).catch(() => {
            // Если попап заблокирован, пробуем анонимно
            auth.signInAnonymously();
        });
    };

    auth.onAuthStateChanged(async (u) => {
        user = u;
        const box = document.getElementById('auth-box');
        if (u) {
            box.innerHTML = `<button class="btn btn-outline" onclick="firebase.auth().signOut()">Выход</button>`;
            const doc = await db.collection('users').doc(u.uid).get();
            if (doc.exists && doc.data().admin) document.getElementById('admin-panel').style.display = 'block';
        } else {
            box.innerHTML = `<button class="btn btn-gradient" id="btn-login">Вход</button>`;
            document.getElementById('admin-panel').style.display = 'none';
        }
    });

    // --- ГАЛЕРЕЯ ---
    async function load() {
        const container = document.getElementById('gallery');
        container.innerHTML = 'Загрузка...';
        arts = [];
        const snap = await db.collection('artworks').where('type', '==', curTab).get();
        
        container.innerHTML = '';
        snap.forEach(d => {
            let data = d.data(); data.id = d.id;
            data.score = (data.hearts || 0) + ((data.fires || 0) * 0.5);
            arts.push(data);
        });

        arts.sort((a,b) => b.score - a.score);

        arts.forEach((art, i) => {
            const card = document.createElement('div');
            card.className = 'art-card';
            card.onclick = () => openLightbox(i);
            card.innerHTML = `<img src="${art.url}">
                <div class="art-stats"><span>❤️ ${art.hearts || 0}</span><span>🔥 ${art.fires || 0}</span></div>`;
            container.appendChild(card);
        });
    }

    // --- АДМИНКА ---
    document.getElementById('btn-upload').onclick = async () => {
        const url = document.getElementById('art-url').value;
        const type = document.getElementById('art-type').value;
        if (!url) return;
        await db.collection('artworks').add({ url, type, hearts: 0, fires: 0, time: Date.now() });
        document.getElementById('art-url').value = '';
        load();
    };

    // --- ЛАЙТБОКС ---
    function openLightbox(i) {
        curIdx = i;
        updateLB();
        document.getElementById('lightbox').style.display = 'block';
        document.body.style.overflow = 'hidden';
    }
    function closeLightbox() {
        document.getElementById('lightbox').style.display = 'none';
        document.body.style.overflow = 'auto';
    }
    function changeImage(d) {
        curIdx = (curIdx + d + arts.length) % arts.length;
        updateLB();
    }
    async function updateLB() {
        const art = arts[curIdx];
        document.getElementById('lb-img').src = art.url;
        document.getElementById('l-count').innerText = art.hearts || 0;
        document.getElementById('f-count').innerText = art.fires || 0;
        
        const box = document.getElementById('comments-box');
        box.innerHTML = '';
        const cSnap = await db.collection('artworks').doc(art.id).collection('comments').orderBy('time', 'asc').get();
        cSnap.forEach(cd => {
            const c = cd.data();
            box.innerHTML += `<div class="comment-item"><strong>${c.user}</strong>${c.text}</div>`;
        });
    }

    // --- РЕАКЦИИ ---
    document.getElementById('btn-like').onclick = () => addReact('hearts');
    document.getElementById('btn-fire').onclick = () => addReact('fires');

    async function addReact(field) {
        if (!user) return alert("Войди!");
        const art = arts[curIdx];
        await db.collection('artworks').doc(art.id).update({ [field]: firebase.firestore.FieldValue.increment(1) });
        art[field]++;
        updateLB();
    }

    document.getElementById('btn-send').onclick = async () => {
        const input = document.getElementById('c-input');
        if (!input.value || !user) return;
        const art = arts[curIdx];
        await db.collection('artworks').doc(art.id).collection('comments').add({
            user: user.displayName || "Аноним", text: input.value, time: Date.now()
        });
        input.value = '';
        updateLB();
    };

    document.getElementById('tab-safe').onclick = () => { curTab = 'safe'; load(); };
    document.getElementById('tab-18plus').onclick = () => { curTab = '18plus'; load(); };

    load();
</script>
</body>
</html>
